name: Scheduled Blog Rebuild

# Triggers a GitHub Pages rebuild daily at 6am CT (11:00 UTC)
# This makes future-dated blog posts go live on their scheduled date

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch: # Allow manual trigger too

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger GitHub Pages rebuild
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.requestPagesBuild({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            console.log('Pages rebuild triggered');
